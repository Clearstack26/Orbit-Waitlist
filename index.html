<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1"
    />
    <meta name="color-scheme" content="light" />
    <meta name="robots" content="noindex, nofollow" />
    <meta name="theme-color" content="#ffffff" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>Orbit Waitlist QR</title>
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/assets/favicon-16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/assets/apple-touch-icon.png" />
    <style>
      :root {
        color-scheme: light;
      }
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }
      html {
        height: 100%;
        overflow: hidden;
        background: #ffffff;
        -webkit-text-size-adjust: 100%;
      }
      body {
        margin: 0;
        min-height: 100%;
        min-height: 100dvh;
        overflow: hidden;
        touch-action: manipulation;
        background: #ffffff;
        font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
        color: #0f0e14;
        padding: max(0.5rem, env(safe-area-inset-top))
          max(0.75rem, env(safe-area-inset-right))
          max(0.5rem, env(safe-area-inset-bottom))
          max(0.75rem, env(safe-area-inset-left));
      }
      #wrap {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        width: 100%;
        height: min(100dvh, 100vh);
        max-height: 100dvh;
      }
      canvas.qr-canvas {
        display: block;
        max-width: 100%;
        image-rendering: pixelated;
        image-rendering: crisp-edges;
      }
      .err {
        font: 500 0.9rem/1.4 system-ui, sans-serif;
        color: #5c5668;
        max-width: 20rem;
        text-align: center;
        padding: 1rem;
      }
      a.visually-hidden:focus {
        position: fixed;
        left: 0.5rem;
        top: 0.5rem;
        clip: auto;
        width: auto;
        height: auto;
        padding: 0.35rem 0.6rem;
        background: #fff;
        border: 1px solid #ccc;
        z-index: 10;
      }
      .visually-hidden {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }
    </style>
  </head>
  <body>
    <a
      class="visually-hidden"
      href="https://orbitwaitlist.au/join"
      >Start the Orbit waitlist experience</a
    >
    <div id="wrap">
      <canvas
        id="qr-url"
        class="qr-canvas"
        role="img"
        aria-label="QR code: opens Orbit waitlist in your browser"
      ></canvas>
      <p id="err" class="err" hidden></p>
    </div>
    <script src="/vendor/qrcode.min.js"></script>
    <script>
      (function () {
        var canvas = document.getElementById("qr-url");
        var errEl = document.getElementById("err");
        var JOIN_URL = "https://orbitwaitlist.au/join";

        function showErr(msg) {
          canvas.hidden = true;
          errEl.hidden = false;
          errEl.textContent = msg;
        }

        function normalizePath(p) {
          var path = String(p || "/join").trim() || "/join";
          if (!path.startsWith("/")) path = "/" + path;
          return path;
        }

        function resolveJoinUrl(cfg) {
          var joinPath = normalizePath(cfg && cfg.joinPath);
          var raw = String((cfg && cfg.baseUrl) || "").trim();
          var placeholder = "your-orbit-waitlist.vercel.app";
          var baseOrigin;
          if (raw && raw.indexOf(placeholder) === -1) {
            baseOrigin = raw.replace(/\/$/, "");
          } else if (
            window.location.hostname === "localhost" ||
            window.location.hostname === "127.0.0.1"
          ) {
            baseOrigin = JOIN_URL.replace(/\/join$/, "");
          } else {
            baseOrigin = window.location.origin;
          }
          var url = baseOrigin + joinPath;
          if (!/^https:\/\//i.test(url)) {
            url = "https://" + url.replace(/^\/\//, "");
          }
          return url;
        }

        function loadJson(url) {
          return fetch(url, { cache: "no-store" }).then(function (r) {
            if (!r.ok) throw new Error(url);
            return r.json();
          });
        }

        function qrColors() {
          return { dark: "#000000", light: "#ffffff" };
        }

        function viewportSize() {
          if (window.visualViewport) {
            return {
              w: window.visualViewport.width,
              h: window.visualViewport.height,
            };
          }
          return { w: window.innerWidth, h: window.innerHeight };
        }

        function qrCssPixelSize() {
          var v = viewportSize();
          var edge = 12;
          var usableW = v.w - edge * 2;
          var usableH = v.h - edge * 2;
          var side = Math.floor(Math.min(usableW, usableH) * 0.94);
          return Math.max(128, Math.min(side, 280));
        }

        function drawCanvas(payload, titleAttr) {
          return new Promise(function (resolve, reject) {
            if (typeof QRCode === "undefined" || !QRCode.toCanvas) {
              reject(new Error("QR library"));
              return;
            }
            var colors = qrColors();
            var cssSize = qrCssPixelSize();
            var dpr = Math.min(window.devicePixelRatio || 1, 3);
            var genSize = Math.round(cssSize * dpr);

            QRCode.toCanvas(
              canvas,
              payload,
              {
                width: genSize,
                margin: 2,
                errorCorrectionLevel: "M",
                color: { dark: colors.dark, light: colors.light },
              },
              function (e) {
                if (e) {
                  reject(e);
                  return;
                }
                canvas.hidden = false;
                canvas.style.width = cssSize + "px";
                canvas.style.height = cssSize + "px";
                if (titleAttr) canvas.setAttribute("title", titleAttr);
                canvas.dataset.url = payload;
                resolve();
              }
            );
          });
        }

        function run() {
          loadJson("/site-config.json")
            .then(function (cfg) {
              var joinUrl = resolveJoinUrl(cfg);
              errEl.hidden = true;
              return drawCanvas(joinUrl, "Opens in browser: " + joinUrl);
            })
            .catch(function () {
              errEl.hidden = true;
              return drawCanvas(
                JOIN_URL,
                "Opens in browser: " + JOIN_URL
              );
            })
            .catch(function () {
              showErr("Could not load QR data. Run npm run build and refresh.");
            });
        }

        run();

        var resizeTimer;
        function onResize() {
          clearTimeout(resizeTimer);
          resizeTimer = setTimeout(run, 100);
        }
        window.addEventListener("resize", onResize);
        window.addEventListener("orientationchange", function () {
          setTimeout(run, 250);
        });
        if (window.visualViewport) {
          window.visualViewport.addEventListener("resize", onResize);
        }
      })();
    </script>
  </body>
</html>
