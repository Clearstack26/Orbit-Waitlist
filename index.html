<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1"
    />
    <meta name="color-scheme" content="light" />
    <meta name="robots" content="noindex, nofollow" />
    <meta name="theme-color" content="#ffffff" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="mobile-web-app-capable" content="yes" />
    <title>Orbit Waitlist QR</title>
    <style>
      :root {
        color-scheme: light;
      }
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }
      html {
        height: 100%;
        overflow: hidden;
        background: #ffffff;
        -webkit-text-size-adjust: 100%;
      }
      body {
        margin: 0;
        min-height: 100%;
        min-height: 100dvh;
        overflow: hidden;
        touch-action: manipulation;
        background: #ffffff;
        font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
        color: #0f0e14;
        padding: max(0.5rem, env(safe-area-inset-top))
          max(0.75rem, env(safe-area-inset-right))
          max(0.5rem, env(safe-area-inset-bottom))
          max(0.75rem, env(safe-area-inset-left));
      }
      #wrap {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: clamp(0.65rem, 2.5vh, 1rem);
        width: 100%;
        height: min(100dvh, 100vh);
        max-height: 100dvh;
      }
      .qr-block {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.35rem;
        flex: 0 1 auto;
        min-height: 0;
      }
      .qr-label {
        margin: 0;
        font-size: 0.6875rem;
        font-weight: 600;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: #4a4456;
      }
      canvas.qr-canvas {
        display: block;
        max-width: 100%;
        image-rendering: pixelated;
        image-rendering: crisp-edges;
      }
      .err {
        font: 500 0.9rem/1.4 system-ui, sans-serif;
        color: #5c5668;
        max-width: 20rem;
        text-align: center;
        padding: 1rem;
      }
      .visually-hidden {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }
      .visually-hidden:focus {
        position: fixed;
        left: 0.5rem;
        top: 0.5rem;
        clip: auto;
        width: auto;
        height: auto;
        padding: 0.35rem 0.6rem;
        background: #fff;
        border: 1px solid #ccc;
        z-index: 10;
      }
    </style>
  </head>
  <body>
    <a class="visually-hidden" href="/join">Join the Orbit waitlist</a>
    <div id="wrap">
      <div class="qr-block">
        <p class="qr-label">Join waitlist</p>
        <canvas
          id="qr-join"
          class="qr-canvas"
          role="img"
          aria-label="QR code: open Orbit waitlist signup page"
        ></canvas>
      </div>
      <div class="qr-block">
        <p class="qr-label">All phones and Android</p>
        <canvas
          id="qr-vcard"
          class="qr-canvas"
          role="img"
          aria-label="QR code: save Orbit waitlist link on any phone"
        ></canvas>
      </div>
      <p id="err" class="err" hidden></p>
    </div>
    <script src="/vendor/qrcode.min.js"></script>
    <script>
      (function () {
        var canvasJoin = document.getElementById("qr-join");
        var canvasVcard = document.getElementById("qr-vcard");
        var errEl = document.getElementById("err");

        function showErr(msg) {
          canvasJoin.hidden = true;
          canvasVcard.hidden = true;
          errEl.hidden = false;
          errEl.textContent = msg;
        }

        function normalizePath(p) {
          var path = String(p || "/join").trim() || "/join";
          if (!path.startsWith("/")) path = "/" + path;
          return path;
        }

        function resolveJoinUrl(cfg) {
          var joinPath = normalizePath(cfg && cfg.joinPath);
          var raw = String((cfg && cfg.baseUrl) || "").trim();
          var placeholder = "your-orbit-waitlist.vercel.app";
          var baseOrigin;
          if (raw && raw.indexOf(placeholder) === -1) {
            baseOrigin = raw.replace(/\/$/, "");
          } else {
            baseOrigin = window.location.origin;
          }
          return baseOrigin + joinPath;
        }

        function loadJson(url) {
          return fetch(url, { cache: "no-store" }).then(function (r) {
            if (!r.ok) throw new Error(url);
            return r.json();
          });
        }

        function qrColors() {
          return { dark: "#000000", light: "#ffffff" };
        }

        function viewportSize() {
          if (window.visualViewport) {
            return {
              w: window.visualViewport.width,
              h: window.visualViewport.height,
            };
          }
          return { w: window.innerWidth, h: window.innerHeight };
        }

        function qrCssPixelSize() {
          var v = viewportSize();
          var edge = 12;
          var usableW = v.w - edge * 2;
          var usableH = v.h - edge * 2;
          var perQr = usableH * 0.38;
          var side = Math.floor(Math.min(usableW, perQr) * 0.94);
          return Math.max(128, Math.min(side, 280));
        }

        function drawCanvas(canvas, payload, titleAttr, ecLevel) {
          return new Promise(function (resolve, reject) {
            if (typeof QRCode === "undefined" || !QRCode.toCanvas) {
              reject(new Error("QR library"));
              return;
            }
            var cssSize = qrCssPixelSize();
            var dpr = Math.min(window.devicePixelRatio || 1, 3);
            var genSize = Math.round(cssSize * dpr);

            QRCode.toCanvas(
              canvas,
              payload,
              {
                width: genSize,
                margin: 2,
                errorCorrectionLevel: ecLevel || "M",
                color: qrColors(),
              },
              function (e) {
                if (e) {
                  reject(e);
                  return;
                }
                canvas.hidden = false;
                canvas.style.width = cssSize + "px";
                canvas.style.height = cssSize + "px";
                if (titleAttr) canvas.setAttribute("title", titleAttr);
                canvas.dataset.payloadType =
                  payload.indexOf("BEGIN:VCARD") === 0 ? "vcard" : "url";
                resolve();
              }
            );
          });
        }

        function run() {
          Promise.all([
            loadJson("/site-config.json"),
            loadJson("/orbit-vcard-qr.json"),
          ])
            .then(function (results) {
              var cfg = results[0];
              var vcardQr = results[1];
              var joinUrl = resolveJoinUrl(cfg);
              var vcardPayload = String(vcardQr.payload || "").trim();
              if (!vcardPayload) throw new Error("vcard");

              errEl.hidden = true;
              return Promise.all([
                drawCanvas(
                  canvasJoin,
                  joinUrl,
                  "Join waitlist: " + joinUrl,
                  "M"
                ),
                drawCanvas(
                  canvasVcard,
                  vcardPayload,
                  "Works on all phones including Android",
                  "H"
                ),
              ]);
            })
            .catch(function () {
              showErr(
                "Could not load QR data. Run npm run build:vcf and refresh."
              );
            });
        }

        run();

        var resizeTimer;
        function onResize() {
          clearTimeout(resizeTimer);
          resizeTimer = setTimeout(run, 100);
        }
        window.addEventListener("resize", onResize);
        window.addEventListener("orientationchange", function () {
          setTimeout(run, 250);
        });
        if (window.visualViewport) {
          window.visualViewport.addEventListener("resize", onResize);
        }
      })();
    </script>
  </body>
</html>
